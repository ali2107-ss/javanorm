<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Статистика</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="app.js"></script>
  <script>renderSidebar();</script>
  
  <div class="layout">
    <div class="topbar">
      <div class="topbar-title">Глобальная статистика</div>
    </div>
    
    <div class="content">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
        <div class="card" style="animation: fadeIn 0.4s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Динамика среднего балла</h3>
          <canvas id="distChart" style="width: 100%; height: 300px;"></canvas>
        </div>
        
        <div class="card" style="animation: fadeIn 0.6s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Топ нарушений по ГОСТ</h3>
          <canvas id="violChart" style="width: 100%; height: 300px;"></canvas>
        </div>
      </div>
      
      <div class="card" style="animation: fadeIn 0.8s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Соответствие по разделам ГОСТ</h3>
          <div class="table-wrap">
          <table id="sectionTable">
            <thead>
              <tr><th>Раздел</th><th>Нарушений</th><th>Доля</th><th>Соответствие</th></tr>
            </thead>
            <tbody>
              <tr><td colspan="4" style="text-align:center;color:var(--text-gray);padding:24px;">Загрузка...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (checkAuth()) {
      initCharts();
    }

    async function initCharts() {
      const [topViolations, scoreTrend, bySection] = await Promise.all([
        apiCall('/api/v1/stats/top-violations?limit=5'),
        apiCall('/api/v1/stats/score-trend?days=30'),
        apiCall('/api/v1/stats/by-section')
      ]);

      const trendLabels = scoreTrend && scoreTrend.length
        ? scoreTrend.map(d => formatDate(d.date).split(',')[0])
        : [];
      const trendValues = scoreTrend && scoreTrend.length
        ? scoreTrend.map(d => d.averageScore)
        : [];
      drawLineChart(document.getElementById('distChart'), trendLabels, trendValues, {
        color: '#007AFF',
        fill: 'rgba(0,122,255,0.14)'
      });

      const violLabels = topViolations && topViolations.length
        ? topViolations.map(v => (v.ruleCode || 'UNKNOWN').split('.').pop())
        : [];
      const violValues = topViolations && topViolations.length
        ? topViolations.map(v => v.count)
        : [];
      drawBarChart(document.getElementById('violChart'), violLabels, violValues);

      const tbody = document.querySelector('#sectionTable tbody');
      const sections = Array.isArray(bySection) ? bySection : [];
      if (!sections.length) {
        tbody.innerHTML = '<tr><td colspan="4" style="text-align:center;color:var(--text-gray);padding:24px;">Нет данных по разделам</td></tr>';
        return;
      }
      tbody.innerHTML = sections.map(s => {
        const rate = Math.round(s.complianceRate || 0);
        const badge = rate >= 80 ? 'success' : rate >= 60 ? 'warning' : 'danger';
        return `
          <tr>
            <td>${s.sectionName || s.rulePrefix}</td>
            <td>${s.violationCount || 0}</td>
            <td>${s.violationShare || 0}%</td>
            <td><span class="badge ${badge}">${rate}%</span></td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
