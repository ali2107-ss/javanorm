<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Статистика</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <script src="app.js"></script>
    <script>document.write(pageShell('/stats.html'));</script>
    <main class="main">
      <header class="topbar"><div><h1>📈 Статистика</h1><p>Демо-метрики всегда доступны для защиты</p></div></header>
      <section class="grid grid-4" id="statsGrid"></section>
      <section class="card" style="margin-top:22px">
        <h2>Топ нарушений</h2>
        <div class="table-wrap">
          <table><thead><tr><th>Правило</th><th>Описание</th><th>Количество</th></tr></thead><tbody id="violationsBody"></tbody></table>
        </div>
      </section>
    </main>
  </div>
  <script>
    initPage();
    const demo = {
      totalDocuments: 5,
      totalChecks: 8,
      averageScore: 76,
      checksToday: 2,
      topViolations: [
        { ruleCode: 'STRUCTURE.MISSING_SECTION', count: 12, description: 'Отсутствует раздел' },
        { ruleCode: 'FORMAT.WRONG_FONT', count: 8, description: 'Неверный шрифт' },
        { ruleCode: 'LANGUAGE.FORBIDDEN_PHRASE', count: 5, description: 'Запрещённая фраза' }
      ]
    };
    function fillStats(data) {
      document.getElementById('statsGrid').innerHTML = [
        ['📄', 'Документов', data.totalDocuments ?? 5],
        ['🔍', 'Проверок', data.totalChecks ?? 8],
        ['⭐', 'Средний балл', data.averageScore ?? 76],
        ['📅', 'Сегодня', data.checksToday ?? 2]
      ].map(s => `<div class="card stat"><div class="emoji">${s[0]}</div><div><b>${s[2]}</b><span>${s[1]}</span></div></div>`).join('');
      document.getElementById('violationsBody').innerHTML = (data.topViolations || demo.topViolations).map(v => `
        <tr><td><b>${esc(v.ruleCode)}</b></td><td>${esc(v.description)}</td><td>${esc(v.count)}</td></tr>
      `).join('');
    }
    async function loadStats() {
      try { fillStats(await apiCall('/api/v1/admin/stats')); }
      catch(e) { fillStats(demo); }
    }
    loadStats();
  </script>
</body>
</html>
