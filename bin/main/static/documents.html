<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Документы</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 16px;
      padding: 60px;
      text-align: center;
      transition: 0.2s all ease;
      cursor: pointer;
    }
    .drop-zone.dragover {
      border-color: var(--accent);
      background: var(--accent-light);
    }
  </style>
</head>
<body>
  <script src="app.js"></script>
  <script>renderSidebar();</script>
  
  <div class="layout">
    <div class="topbar">
      <div class="topbar-title">Документы</div>
      <button class="btn btn-primary" onclick="document.getElementById('uploadModal').style.display='flex'">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        Загрузить
      </button>
    </div>
    
    <div class="content">
      <div class="card" style="animation: fadeIn 0.5s ease;">
        <div class="table-wrap">
          <table id="docsTable">
            <thead>
              <tr>
                <th>Название</th>
                <th>Тип</th>
                <th>Размер</th>
                <th>Дата</th>
                <th>Статус</th>
                <th>Действия</th>
              </tr>
            </thead>
            <tbody>
              <!-- JS -->
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <div id="uploadModal" class="modal-overlay" style="display:none;">
    <div class="modal-content" style="animation: countUp 0.3s ease;">
      <div style="display:flex; justify-content:space-between; margin-bottom:24px;">
        <h3 style="font-size:20px; font-weight:bold;">Загрузка документа</h3>
        <button onclick="closeModal()" style="background:none; border:none; cursor:pointer; color:var(--text-gray);">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
        </button>
      </div>
      
      <div class="drop-zone" id="dropZone">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:16px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
        <div style="font-size:16px; font-weight:600; margin-bottom:8px;">Перетащите файл сюда</div>
        <div style="color:var(--text-gray); font-size:14px;">Поддерживаются: DOCX, PDF, TXT, MD<br>Максимальный размер: 50 МБ</div>
        <input type="file" id="fileInput" style="display:none;" accept=".docx,.pdf,.txt,.md">
      </div>
      
      <div id="uploadProgress" style="display:none; margin-top:24px;">
        <div style="display:flex; justify-content:space-between; margin-bottom:8px; font-size:14px; font-weight:500;">
          <span id="uploadFilename"></span>
          <span id="uploadPercent">0%</span>
        </div>
        <div class="progress-bg">
          <div class="progress-fill" id="uploadBar" style="width:0%"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (checkAuth()) {
      loadDocs();
      setupUpload();
    }

    function closeModal() {
      document.getElementById('uploadModal').style.display = 'none';
      document.getElementById('uploadProgress').style.display = 'none';
      document.getElementById('dropZone').style.display = 'block';
    }

    function setupUpload() {
      const dz = document.getElementById('dropZone');
      const fi = document.getElementById('fileInput');

      dz.onclick = () => fi.click();
      
      dz.ondragover = e => {
        e.preventDefault();
        dz.classList.add('dragover');
      };
      dz.ondragleave = e => {
        e.preventDefault();
        dz.classList.remove('dragover');
      };
      dz.ondrop = e => {
        e.preventDefault();
        dz.classList.remove('dragover');
        if (e.dataTransfer.files.length) uploadFile(e.dataTransfer.files[0]);
      };
      fi.onchange = e => {
        if (e.target.files.length) uploadFile(e.target.files[0]);
      };
    }

    async function uploadFile(file) {
      if (file.size > 50*1024*1024) {
        showToast('Файл слишком большой (>50МБ)', 'error');
        return;
      }
      document.getElementById('dropZone').style.display = 'none';
      const p = document.getElementById('uploadProgress');
      p.style.display = 'block';
      document.getElementById('uploadFilename').textContent = file.name;
      
      const bar = document.getElementById('uploadBar');
      const pct = document.getElementById('uploadPercent');
      
      // Имитация прогресса
      let pVal = 0;
      const t = setInterval(() => {
        pVal += Math.random() * 10;
        if (pVal >= 90) clearInterval(t);
        else {
          bar.style.width = pVal + '%';
          pct.textContent = Math.round(pVal) + '%';
        }
      }, 100);

      const fd = new FormData();
      fd.append('file', file);
      
      try {
        const res = await fetch('/api/v1/documents', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + getToken() },
          body: fd
        });
        clearInterval(t);
        bar.style.width = '100%';
        pct.textContent = '100%';
        
        if (res.ok) {
          showToast('Файл успешно загружен', 'success');
          setTimeout(() => { closeModal(); loadDocs(); }, 500);
        } else {
          showToast('Ошибка при загрузке', 'error');
          setTimeout(closeModal, 1000);
        }
      } catch(e) {
        clearInterval(t);
        showToast('Ошибка сети', 'error');
        setTimeout(closeModal, 1000);
      }
    }

    async function loadDocs() {
      const demoDocs = [
        { id: '1', originalFilename: 'ТЗ_Система.docx', contentType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', size: 1048576, createdAt: new Date().toISOString(), status: 'CHECKED' },
        { id: '2', originalFilename: 'Пояснительная.docx', contentType: 'application/vnd.openxmlformats-officedocument.wordprocessingml.document', size: 512000, createdAt: new Date(Date.now()-86400000).toISOString(), status: 'CHECKED' },
        { id: '3', originalFilename: 'Руководство.pdf', contentType: 'application/pdf', size: 2048000, createdAt: new Date(Date.now()-172800000).toISOString(), status: 'UPLOADED' }
      ];
      let data = await apiCall('/api/v1/documents');
      let docs = Array.isArray(data) ? data : (data?.content || demoDocs);
      if (docs.length === 0) docs = demoDocs;

      const tbody = document.querySelector('#docsTable tbody');
      tbody.innerHTML = docs.map(doc => {
        const name = doc.originalFilename || doc.fileName || doc.name || 'Документ';
        let ext = name.split('.').pop().toUpperCase();
        if (ext === name.toUpperCase()) ext = 'TXT';
        
        let color = '#6E6E73';
        let bg = '#F5F5F7';
        if (ext === 'DOCX' || ext === 'DOC') { color = '#007AFF'; bg = '#E5F1FF'; }
        else if (ext === 'PDF') { color = '#FF3B30'; bg = '#FFEBEB'; }

        let stBadge = '<span class="badge" style="background:#F5F5F7;color:#6E6E73">ЗАГРУЖЕН</span>';
        if (doc.status === 'CHECKED' || doc.score !== undefined) {
          stBadge = '<span class="badge success">ПРОВЕРЕН</span>';
        } else if (doc.status === 'PROCESSING') {
          stBadge = '<span class="badge warning">В ОБРАБОТКЕ</span>';
        }

        return `
          <tr>
            <td style="font-weight:500;">${name}</td>
            <td><span class="badge" style="background:${bg};color:${color}">${ext}</span></td>
            <td>${formatSize(doc.size)}</td>
            <td>${formatDate(doc.createdAt)}</td>
            <td>${stBadge}</td>
            <td>
              <div style="display:flex; gap:8px;">
                <button class="btn btn-primary" style="padding:6px 12px; font-size:13px;" onclick="window.location.href='/check.html?doc=${doc.id}'">Проверить</button>
                <button class="btn btn-outline" style="padding:6px 12px; font-size:13px;" onclick="downloadFile('/api/v1/documents/${doc.id}/report/download', 'report.pdf')">Отчёт</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
