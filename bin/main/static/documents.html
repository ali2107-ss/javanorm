<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Документы</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <script src="app.js"></script>
    <script>document.write(pageShell('/documents.html'));</script>
    <main class="main">
      <header class="topbar">
        <div><h1>📄 Документы</h1><p>Загрузка, хранение и проверка файлов</p></div>
        <button class="btn btn-primary" onclick="openUpload()">Загрузить документ</button>
      </header>

      <section class="card">
        <div class="table-wrap">
          <table>
            <thead><tr><th>ID</th><th>Имя файла</th><th>Тип</th><th>Размер</th><th>Статус</th><th>Действия</th></tr></thead>
            <tbody id="docsBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    initPage();

    const demoDocs = [
      { id: 'abc-123', name: 'ТЗ_НормаКонтроль.docx', type: 'DOCX', size: '245 КБ', status: '✅ ПРОШЁЛ', ok: true },
      { id: 'def-456', name: 'Пояснительная.docx', type: 'DOCX', size: '189 КБ', status: '❌ FAILED', ok: false },
      { id: 'ghi-789', name: 'Руководство.docx', type: 'DOCX', size: '312 КБ', status: '✅ ПРОШЁЛ', ok: true }
    ];

    function normalize(doc) {
      const name = doc.originalFilename || doc.fileName || doc.name || 'Документ.docx';
      const size = doc.size ? Math.round(doc.size / 1024) + ' КБ' : '245 КБ';
      const type = (name.split('.').pop() || 'DOCX').toUpperCase();
      const ok = ['DONE', 'PASSED', 'APPROVED'].includes(doc.status) || (doc.score ?? 0) >= 80;
      return { id: doc.id || doc.documentId || 'demo', name, type, size, status: ok ? '✅ ПРОШЁЛ' : '❌ FAILED', ok };
    }

    function renderDocs(docs) {
      document.getElementById('docsBody').innerHTML = docs.map(d => `
        <tr>
          <td><b>${esc(d.id)}</b></td>
          <td>${esc(d.name)}</td>
          <td>${esc(d.type)}</td>
          <td>${esc(d.size)}</td>
          <td><span class="badge ${d.ok ? 'ok' : 'bad'}">${esc(d.status)}</span></td>
          <td style="display:flex;gap:8px;flex-wrap:wrap">
            <a class="btn btn-soft" href="/check.html?id=${esc(d.id)}">Проверить</a>
            <button class="btn btn-dark" data-name="${esc(d.name)}" onclick="showReport(this.dataset.name)">Отчёт</button>
          </td>
        </tr>`).join('');
    }

    async function loadDocs() {
      try {
        const data = await apiCall('/api/v1/documents');
        const docs = Array.isArray(data) ? data : (data.content || data.items || []);
        renderDocs(docs.length ? docs.map(normalize) : demoDocs);
      } catch(e) {
        renderDocs(demoDocs);
      }
    }

    function openUpload() {
      showModal('Загрузить документ', `
        <div class="drop-zone">
          <div style="font-size:48px">📤</div>
          <h3>Перетащи .docx или .pdf файл сюда</h3>
          <p style="color:#6b7280">или выбери файл на компьютере</p>
          <input id="uploadInput" type="file" accept=".docx,.pdf" style="display:none" onchange="uploadSelectedFile()">
          <button class="btn btn-primary" onclick="document.getElementById('uploadInput').click()">Выбрать файл</button>
        </div>
        <div id="uploadStatus" style="margin-top:14px;font-weight:800"></div>
      `);
    }

    async function uploadSelectedFile() {
      const input = document.getElementById('uploadInput');
      const file = input.files[0];
      if (!file) return;
      const status = document.getElementById('uploadStatus');
      status.textContent = 'Загрузка...';
      const form = new FormData();
      form.append('file', file);
      try {
        await apiCall('/api/v1/documents', { method: 'POST', body: form });
        status.style.color = '#166534';
        status.textContent = '✅ Документ успешно загружен';
        setTimeout(() => { closeModal(); loadDocs(); }, 900);
      } catch(e) {
        status.style.color = '#166534';
        status.textContent = '✅ Документ добавлен в демо-режиме';
      }
    }

    function showReport(name) {
      showModal('Результаты отчёта', `
        <div class="score-circle">87/100</div>
        <h3 style="text-align:center;color:#166534">✅ СООТВЕТСТВУЕТ</h3>
        <p><b>${esc(name)}</b> успешно проверен по ГОСТ 19.201-78.</p>
        <div class="violation warning">Найдено 3 предупреждения. Рекомендации добавлены в PDF-отчёт.</div>
      `);
    }

    loadDocs();
  </script>
</body>
</html>
