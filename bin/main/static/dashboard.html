<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Дашборд</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <script src="app.js"></script>
  <script>renderSidebar();</script>
  
  <div class="layout">
    <div class="topbar">
      <div class="topbar-title">Дашборд</div>
      <div class="topbar-time" id="currentTime"></div>
    </div>
    
    <div class="content">
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px;" id="statsGrid">
        <!-- Rendered via JS -->
      </div>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
        <div class="card" style="animation: slideIn 0.5s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Динамика баллов</h3>
          <canvas id="scoreChart" style="width: 100%; height: 250px;"></canvas>
        </div>
        
        <div class="card" style="animation: slideIn 0.6s ease;">
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px;">
            <h3 style="font-size: 16px;">Последние документы</h3>
          </div>
          <div class="table-wrap">
            <table id="docsTable">
              <thead>
                <tr>
                  <th>Файл</th>
                  <th>Балл</th>
                  <th>Статус</th>
                </tr>
              </thead>
              <tbody>
                <!-- JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (checkAuth()) {
      initDashboard();
    }

    async function initDashboard() {
      // Load Stats
      const isAdmin = getUserInfo().role.includes('ADMIN');
      let stats = null;
      if (isAdmin) {
        stats = await apiCall('/api/v1/admin/stats');
      }
      
      // Fallback or generic stats if not admin or error
      if (!stats) {
        const docs = await apiCall('/api/v1/documents');
        const list = Array.isArray(docs) ? docs : (docs?.content || []);
        const checked = list.filter(d => d.status === 'CHECKED');
        const results = await Promise.all(checked.map(d => apiCall(`/api/v1/documents/${d.id}/result`)));
        const realResults = results.filter(Boolean);
        const avg = realResults.length ? realResults.reduce((acc, r) => acc + (r.complianceScore || 0), 0) / realResults.length : 0;
        stats = {
          totalDocuments: list.length,
          totalChecks: realResults.length,
          checksToday: realResults.filter(r => r.checkedAt && new Date(r.checkedAt).toDateString() === new Date().toDateString()).length,
          passedDocuments: realResults.filter(r => r.passed || r.complianceScore >= 80).length,
          failedDocuments: realResults.filter(r => !r.passed && r.complianceScore < 80).length,
          averageScore: avg
        };
      }
      
      const total = stats.totalDocuments ?? 0;
      const totalChecks = stats.totalChecks ?? 0;
      const today = stats.checksToday ?? 0;
      const avg = Math.round(stats.averageScore ?? 0);

      const items = [
        { label: 'Всего документов', value: total, icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>' },
        { label: 'Всего проверок', value: totalChecks, icon: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>' },
        { label: 'Проверок сегодня', value: today, icon: '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>' },
        { label: 'Средний балл', value: avg, icon: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>' }
      ];

      const grid = document.getElementById('statsGrid');
      grid.innerHTML = '';
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.style.animation = `fadeIn 0.5s ease ${i * 0.1}s forwards`;
        div.style.opacity = '0';
        div.innerHTML = `
          <div style="display: flex; align-items: center; gap: 16px;">
            <div style="width: 40px; height: 40px; background: var(--accent-light); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${item.icon}</svg>
            </div>
            <div>
              <div style="font-size: 36px; font-weight: 800; line-height: 1;" class="count-target">0</div>
              <div style="color: var(--text-gray); font-size: 14px; margin-top: 4px;">${item.label}</div>
            </div>
          </div>
        `;
        grid.appendChild(div);
        setTimeout(() => {
          animateCount(div.querySelector('.count-target'), item.value);
        }, 100 + i * 100);
      });

      // Chart - Trend
      const trendData = await apiCall('/api/v1/stats/score-trend?days=7');
      const chartLabels = trendData && trendData.length ? trendData.map(d => formatDate(d.date).split(',')[0]) : ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'];
      const chartValues = trendData && trendData.length ? trendData.map(d => d.averageScore) : [0, 0, 0, 0, 0, 0, 0];

      drawLineChart(document.getElementById('scoreChart'), chartLabels, chartValues, {
        color: '#FF6B00',
        fill: 'rgba(255,107,0,0.16)'
      });

      // Table
      let docsData = await apiCall('/api/v1/documents?size=5');
      let docs = Array.isArray(docsData) ? docsData : (docsData?.content || []);
      const docResults = await Promise.all(docs.slice(0, 5).map(doc => 
        doc.status === 'CHECKED' ? apiCall(`/api/v1/documents/${doc.id}/result`) : Promise.resolve(null)
      ));

      const tbody = document.querySelector('#docsTable tbody');
      if (docs.length === 0) {
        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;padding:20px;color:var(--text-gray)">Документов пока нет</td></tr>';
      } else {
        tbody.innerHTML = docs.slice(0, 5).map((doc, index) => {
          const result = docResults[index];
          const score = result?.complianceScore;
          const name = doc.originalFilename || doc.fileName || doc.name || 'Документ';
          let badge = '<span class="badge" style="background:var(--bg-secondary);color:var(--text-gray)">UPLOADED</span>';
          let bVal = '—';
          
          if (doc.status === 'CHECKED' && result) {
            bVal = score || 0;
            const ok = result.passed || (bVal >= 80);
            badge = ok 
              ? '<span class="badge success">ПРОШЁЛ</span>'
              : '<span class="badge danger">НЕ ПРОШЁЛ</span>';
          } else if (doc.status === 'CHECKING' || doc.status === 'QUEUED' || doc.status === 'PROCESSING') {
            badge = '<span class="badge" style="background:#FFF0E6;color:#FF6B00">CHECKING</span>';
          }
          
          return `
            <tr>
              <td style="font-weight:500;">${name}</td>
              <td style="font-weight:600;">${bVal}</td>
              <td>${badge}</td>
            </tr>
          `;
        }).join('');
      }
    }
  </script>
</body>
</html>
