<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Вход</title>
  <link rel="stylesheet" href="style.css">
</head>
<body style="margin:0; min-height:100vh; display:flex;">
  <div style="width: 50%; background: var(--sidebar); color: white; display: flex; flex-direction: column; justify-content: center; padding: 60px;">
    <div style="margin-bottom: 24px;">
      <div style="width: 48px; height: 48px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: bold; margin-bottom: 24px; border-radius: 8px;">N</div>
      <h1 style="font-size: 32px; font-weight: bold; margin-bottom: 12px;">НормаКонтроль</h1>
      <p style="color: var(--sidebar-text); font-size: 16px;">Автоматизированная проверка документов<br>на соответствие ГОСТ 19.201-78</p>
    </div>
    <div style="display: flex; flex-direction: column; gap: 20px; margin-top: 40px;">
      <div style="display: flex; align-items: center; gap: 16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
        <span style="font-size: 15px; color: #E5E5EA;">Анализ структуры по ГОСТ</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
        <span style="font-size: 15px; color: #E5E5EA;">Генерация PDF-отчётов</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
        <span style="font-size: 15px; color: #E5E5EA;">Проверка антиплагиата</span>
      </div>
    </div>
    <div style="margin-top: auto; color: var(--sidebar-text); font-size: 13px;">
      Разработано в рамках курса Продвинутая Java
    </div>
  </div>

  <div style="width: 50%; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; padding: 40px;">
    <div style="background: white; border-radius: 20px; padding: 48px; width: 100%; max-width: 480px; box-shadow: 0 4px 60px rgba(0,0,0,0.1); animation: fadeIn 0.5s ease;">
      <h2 style="font-size: 28px; font-weight: bold; margin-bottom: 8px;">Вход в систему</h2>
      <p style="color: var(--text-gray); margin-bottom: 32px; font-size: 15px;">Введите данные для входа</p>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" id="email" class="form-control" placeholder="name@example.com" value="admin@demo.ru">
      </div>
      <div class="form-group" style="margin-bottom: 24px;">
        <label class="form-label">Пароль</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" value="Admin1234!">
      </div>

      <button class="btn-primary" id="loginBtn" onclick="login()" style="width: 100%; border-radius: 10px; padding: 14px; font-size: 16px; font-weight: 600; border: none; cursor: pointer; display: flex; justify-content: center; align-items: center; transition: 0.2s all ease;">
        Войти
      </button>

      <div style="text-align: center; color: var(--danger); margin-top: 12px; font-size: 14px; font-weight: 500;" id="errorBox"></div>

      <div style="display: flex; align-items: center; margin: 32px 0;">
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
        <div style="padding: 0 16px; color: var(--text-gray); font-size: 14px;">или</div>
        <div style="flex: 1; height: 1px; background: var(--border);"></div>
      </div>

      <div style="border: 1.5px solid var(--border); border-radius: 12px; padding: 16px;">
        <div style="font-size: 13px; color: var(--text-gray); font-weight: 500; margin-bottom: 12px; text-transform: uppercase;">Быстрый доступ</div>
        <div style="display: flex; gap: 12px;">
          <button class="btn btn-outline" style="flex: 1; border-color: var(--accent); color: var(--accent);" onclick="quickLogin('admin@demo.ru', 'Admin1234!')" onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background='transparent'">Администратор</button>
          <button class="btn btn-outline" style="flex: 1; border-color: var(--accent); color: var(--accent);" onclick="quickLogin('user@demo.ru', 'User1234!')" onmouseover="this.style.background='var(--accent-light)'" onmouseout="this.style.background='transparent'">Студент</button>
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function quickLogin(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      login();
    }

    async function login() {
      const email = document.getElementById('email');
      const password = document.getElementById('password');
      const btn = document.getElementById('loginBtn');
      const err = document.getElementById('errorBox');

      email.style.borderColor = 'var(--border)';
      password.style.borderColor = 'var(--border)';
      err.textContent = '';

      if (!email.value || !password.value) {
        if (!email.value) email.style.borderColor = 'var(--danger)';
        if (!password.value) password.style.borderColor = 'var(--danger)';
        err.textContent = 'Заполните все поля';
        return;
      }

      btn.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="animation: spin 1s linear infinite;"><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>';
      btn.disabled = true;

      try {
        const response = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: email.value, password: password.value })
        });
        
        let token;
        if (response.ok) {
          const data = await response.json();
          token = data.access_token || data.accessToken || data.token;
        } else {
          throw new Error('Неверный логин или пароль');
        }
        
        if (token) {
          localStorage.setItem('jwt_token', token);
          document.body.style.transition = '0.3s opacity ease';
          document.body.style.opacity = '0';
          setTimeout(() => window.location.href = '/dashboard.html', 300);
        } else {
          throw new Error('Ошибка авторизации');
        }
      } catch (e) {
        email.style.borderColor = 'var(--danger)';
        password.style.borderColor = 'var(--danger)';
        err.textContent = e.message || 'Ошибка сервера';
        btn.innerHTML = 'Войти';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
