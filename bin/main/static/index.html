<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-logo">
      <span class="icon">🔍</span>
      <h1>НормаКонтроль</h1>
      <p>Проверка документов по ГОСТ 19.201-78</p>
    </div>

    <div class="field">
      <label for="email">Email</label>
      <div class="input-wrap"><span>✉️</span><input id="email" type="email" value="admin@demo.ru" autocomplete="username"></div>
    </div>
    <div class="field">
      <label for="password">Пароль</label>
      <div class="input-wrap"><span>🔒</span><input id="password" type="password" value="Admin1234!" autocomplete="current-password"></div>
    </div>

    <div class="error-box" id="errorBox"></div>
    <button class="btn btn-primary btn-full" onclick="login()">Войти</button>

    <div style="text-align:center;color:#6b7280;margin-top:24px;font-weight:800">Быстрый вход</div>
    <div class="quick-login">
      <button class="btn btn-soft" onclick="quickLogin('admin@demo.ru','Admin1234!')">👑 Админ</button>
      <button class="btn btn-soft" onclick="quickLogin('user@demo.ru','User1234!')">👤 Студент</button>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    function showError(text) {
      const box = document.getElementById('errorBox');
      box.textContent = text;
      box.style.display = 'block';
    }

    function quickLogin(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      login();
    }

    function createDemoToken(email) {
      const role = email === 'admin@demo.ru' ? 'ROLE_ADMIN' : 'ROLE_USER';
      const name = email === 'admin@demo.ru' ? 'Администратор' : 'Студент';
      const payload = {
        sub: email,
        email: email,
        name: name,
        roles: role,
        exp: Math.floor(Date.now() / 1000) + 3600
      };
      const encode = obj => btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      return encode({ alg: 'HS256', typ: 'JWT' }) + '.' + encode(payload) + '.demo';
    }

    function tryDemoLogin(email, password) {
      const demoUsers = {
        'admin@demo.ru': 'Admin1234!',
        'user@demo.ru': 'User1234!'
      };
      if (demoUsers[email] !== password) return false;
      localStorage.setItem('jwt_token', createDemoToken(email));
      window.location.href = '/dashboard.html';
      return true;
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      document.getElementById('errorBox').style.display = 'none';

      if (!email || !password) {
        showError('Введите email и пароль');
        return;
      }

      try {
        const response = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: email, password: password })
        });
        if (!response.ok) throw new Error('Неверный email или пароль');
        const data = await response.json();
        const token = data.access_token || data.accessToken || data.token;
        if (!token) throw new Error('Сервер не вернул JWT токен');
        localStorage.setItem('jwt_token', token);
        window.location.href = '/dashboard.html';
      } catch (e) {
        if (tryDemoLogin(email, password)) return;
        showError(e.message || 'Ошибка входа');
      }
    }
  </script>
</body>
</html>
