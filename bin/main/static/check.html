<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Проверка</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <script src="app.js"></script>
    <script>document.write(pageShell('/check.html'));</script>
    <main class="main">
      <header class="topbar">
        <div><h1>🔍 Проверка документа</h1><p>Демонстрационный сценарий работает даже без API</p></div>
      </header>

      <section class="card" id="selectCard">
        <h2>Шаг 1 — выбор документа</h2>
        <div class="field">
          <label for="docSelect">Документ</label>
          <select id="docSelect" style="width:100%;padding:14px;border:1px solid #d9e2ef;border-radius:14px"></select>
        </div>
        <button class="btn btn-primary" style="font-size:18px;padding:16px 28px" onclick="startCheck()">🚀 Запустить проверку</button>
      </section>

      <section class="card" id="progressCard" style="display:none">
        <h2>Шаг 2 — прогресс проверки</h2>
        <h3 id="checkingName">Документ</h3>
        <div style="display:flex;justify-content:space-between;font-weight:900;margin:16px 0 8px">
          <span id="progressText">Подготовка...</span><span id="progressPct">0%</span>
        </div>
        <div class="progress-outer"><div class="progress-inner" id="progressBar"></div></div>
        <div class="grid" style="margin-top:22px" id="stepsBox"></div>
      </section>

      <section id="resultCard" style="display:none"></section>
    </main>
  </div>

  <script>
    initPage();

    const demoDocs = [
      { id: 'abc-123', name: 'ТЗ_НормаКонтроль.docx' },
      { id: 'def-456', name: 'Пояснительная.docx' },
      { id: 'ghi-789', name: 'Руководство.docx' }
    ];
    const steps = [
      { percent: 15, text: 'Загрузка файла', delay: 1000 },
      { percent: 35, text: 'Анализ структуры', delay: 3000 },
      { percent: 60, text: 'Проверка правил ГОСТ', delay: 6000 },
      { percent: 78, text: 'AI-рекомендации', delay: 9000 },
      { percent: 90, text: 'Генерация отчёта', delay: 12000 },
      { percent: 100, text: 'Готово!', delay: 15000 }
    ];
    let currentDoc = null;
    let timers = [];
    let finished = false;

    function renderSteps(doneIndex = -1) {
      document.getElementById('stepsBox').innerHTML = steps.map((s, i) => `
        <div class="step ${i <= doneIndex ? 'done' : ''}">
          <span>${i <= doneIndex ? '✅' : '⏳'}</span>${esc(s.text)}
        </div>`).join('');
    }

    function updateProgress(percent, text, index) {
      document.getElementById('progressBar').style.width = percent + '%';
      document.getElementById('progressPct').textContent = percent + '%';
      document.getElementById('progressText').textContent = text;
      renderSteps(index);
    }

    async function loadDocuments() {
      try {
        const data = await apiCall('/api/v1/documents');
        const docs = (Array.isArray(data) ? data : (data.content || data.items || []))
          .map(d => ({ id: d.id || d.documentId, name: d.originalFilename || d.fileName || d.name }))
          .filter(d => d.id && d.name);
        fillSelect(docs.length ? docs : demoDocs);
      } catch(e) {
        fillSelect(demoDocs);
      }
      const urlId = new URLSearchParams(location.search).get('id');
      if (urlId) document.getElementById('docSelect').value = urlId;
      const active = localStorage.getItem('activeCheckId');
      if (active) {
        document.getElementById('docSelect').value = active;
        startCheck(true);
      }
    }

    function fillSelect(docs) {
      document.getElementById('docSelect').innerHTML = docs.map(d =>
        `<option value="${esc(d.id)}">${esc(d.name)}</option>`
      ).join('');
    }

    async function startCheck(restored = false) {
      const select = document.getElementById('docSelect');
      const id = select.value;
      const name = select.options[select.selectedIndex]?.text || 'Документ';
      currentDoc = { id, name };
      finished = false;
      timers.forEach(clearTimeout);
      timers = [];
      localStorage.setItem('activeCheckId', id);
      localStorage.setItem('activeCheckName', name);

      document.getElementById('selectCard').style.display = 'none';
      document.getElementById('progressCard').style.display = 'block';
      document.getElementById('resultCard').style.display = 'none';
      document.getElementById('checkingName').textContent = name;
      updateProgress(restored ? 15 : 0, restored ? 'Продолжаем проверку...' : 'Запуск проверки...', restored ? 0 : -1);

      apiCall(`/api/v1/documents/${id}/check`, { method: 'POST', body: JSON.stringify({ enableAI: true }) })
        .then(data => {
          if (data?.result || data?.checkResult || data?.score) finishWithResult(data.result || data.checkResult || data);
        })
        .catch(() => {});

      steps.forEach((step, index) => {
        timers.push(setTimeout(() => {
          if (finished) return;
          updateProgress(step.percent, step.text, index);
          if (step.percent === 100) loadResult();
        }, step.delay));
      });
    }

    async function loadResult() {
      try {
        const result = await apiCall(`/api/v1/documents/${currentDoc.id}/result`);
        finishWithResult(result || demoResult());
      } catch(e) {
        finishWithResult(demoResult());
      }
    }

    function demoResult() {
      return { score: 87, passed: true };
    }

    function finishWithResult(result) {
      if (finished) return;
      finished = true;
      timers.forEach(clearTimeout);
      localStorage.removeItem('activeCheckId');
      localStorage.removeItem('activeCheckName');
      document.getElementById('progressCard').style.display = 'none';
      document.getElementById('resultCard').style.display = 'block';
      document.getElementById('resultCard').innerHTML = `
        <div class="card">
          <h2>Шаг 3 — результаты проверки</h2>
          <div class="score-circle">${Math.round(result.score ?? 87)}/100</div>
          <h2 style="text-align:center;color:#166534">✅ СООТВЕТСТВУЕТ</h2>
          <h3>${esc(currentDoc.name)}</h3>

          <h3>🔴 КРИТИЧНО (2)</h3>
          <div class="violation critical"><b>Отсутствует раздел "ОСНОВАНИЯ ДЛЯ РАЗРАБОТКИ"</b><br>💡 Добавьте раздел согласно ГОСТ 19.201-78 п.2</div>
          <div class="violation critical"><b>Запрещённая фраза "и т.д." в абзаце 15</b><br>💡 Перечислите все пункты явно</div>

          <h3>🟡 ПРЕДУПРЕЖДЕНИЕ (3)</h3>
          <div class="violation warning"><b>Неверный шрифт Calibri на стр. 3</b><br>💡 Замените на Times New Roman 14pt</div>
          <div class="violation warning"><b>Таблица 2 не имеет подписи</b><br>💡 Добавьте "Таблица 2 — Наименование"</div>
          <div class="violation warning"><b>Выравнивание по левому краю в абзаце 8</b><br>💡 Установите выравнивание по ширине</div>

          <h3>ℹ️ ИНФОРМАЦИЯ (1)</h3>
          <div class="violation info"><b>Рекомендуется добавить аннотацию</b></div>

          <div style="display:flex;gap:12px;flex-wrap:wrap;margin-top:22px">
            <button class="btn btn-primary" onclick="showModal('PDF отчёт','<p>📄 PDF отчёт сформирован в демо-режиме и готов к скачиванию.</p>')">📄 Скачать PDF отчёт</button>
            <button class="btn btn-green" onclick="showModal('Авто-исправление','<p>🔧 Предложения по исправлению подготовлены. Документ можно привести к ГОСТ за 1 клик.</p>')">🔧 Авто-исправить</button>
            <button class="btn btn-soft" onclick="location.href='/check.html'">Новая проверка</button>
          </div>
        </div>`;
    }

    renderSteps();
    loadDocuments();
  </script>
</body>
</html>
