databaseChangeLog:
  - changeSet:
      id: 007-create-audit-log
      author: normacontrol
      changes:
        - createTable:
            tableName: audit_log
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: action
                  type: VARCHAR(64)
                  constraints:
                    nullable: false
              - column:
                  name: document_id
                  type: UUID
              - column:
                  name: user_id
                  type: UUID
              - column:
                  name: details
                  type: TEXT
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_audit_log_document_id
            tableName: audit_log
            columns:
              - column:
                  name: document_id
