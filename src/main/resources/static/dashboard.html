<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Дашборд</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="layout">
    <script src="app.js"></script>
    <script>document.write(pageShell('/dashboard.html'));</script>
    <main class="main">
      <header class="topbar">
        <div><h1>📊 Дашборд</h1><p>Состояние системы проверки документов</p></div>
        <a class="btn btn-primary" href="/check.html">🚀 Новая проверка</a>
      </header>

      <section class="grid grid-4" id="statsGrid"></section>

      <section class="card" style="margin-top:22px">
        <div class="topbar" style="margin-bottom:12px">
          <div><h1 style="font-size:22px">Последние проверки</h1><p>Документы и результаты анализа</p></div>
          <a class="btn btn-soft" href="/documents.html">Все документы</a>
        </div>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Файл</th><th>Балл</th><th>Статус</th><th>Действие</th></tr></thead>
            <tbody id="recentBody"></tbody>
          </table>
        </div>
      </section>
    </main>
  </div>

  <script>
    initPage();

    const demoStats = { totalDocuments: 5, passedDocuments: 3, failedDocuments: 2, averageScore: 76 };
    const demoRows = [
      { id: 'abc-123', name: 'ТЗ_НормаКонтроль.docx', score: 87, passed: true },
      { id: 'def-456', name: 'Пояснительная.docx', score: 62, passed: false },
      { id: 'ghi-789', name: 'Руководство.docx', score: 94, passed: true }
    ];

    function renderStats(data) {
      const total = data.totalDocuments ?? data.total ?? 5;
      const passed = data.passedDocuments ?? data.passed ?? 3;
      const failed = data.failedDocuments ?? data.failed ?? Math.max(0, total - passed);
      const avg = Math.round(data.averageScore ?? data.avgScore ?? 76);
      document.getElementById('statsGrid').innerHTML = [
        ['📄', 'Документов', total],
        ['✅', 'Прошли', passed],
        ['❌', 'Не прошли', failed],
        ['⭐', 'Средний балл', avg]
      ].map(item => `<div class="card stat"><div class="emoji">${item[0]}</div><div><b>${item[2]}</b><span>${item[1]}</span></div></div>`).join('');
    }

    function normalizeDoc(doc) {
      const score = doc.score ?? doc.checkScore ?? doc.result?.score ?? 76;
      return {
        id: doc.id || doc.documentId || 'demo',
        name: doc.originalFilename || doc.fileName || doc.name || 'Документ.docx',
        score,
        passed: (doc.status === 'PASSED' || doc.status === 'DONE' || score >= 80)
      };
    }

    function renderRows(rows) {
      document.getElementById('recentBody').innerHTML = rows.map(row => `
        <tr>
          <td><b>${esc(row.name)}</b></td>
          <td>${row.score}/100</td>
          <td><span class="badge ${row.passed ? 'ok' : 'bad'}">${row.passed ? '✅ Прошёл' : '❌ Не прошёл'}</span></td>
          <td><a class="btn btn-soft" href="/check.html?id=${esc(row.id)}">Проверить</a></td>
        </tr>`).join('');
    }

    async function loadDashboard() {
      try { renderStats(await apiCall('/api/v1/admin/stats')); }
      catch(e) { renderStats(demoStats); }

      try {
        const data = await apiCall('/api/v1/documents?size=5');
        const docs = Array.isArray(data) ? data : (data.content || data.items || []);
        renderRows(docs.length ? docs.map(normalizeDoc) : demoRows);
      } catch(e) {
        renderRows(demoRows);
      }
    }

    loadDashboard();
  </script>
</body>
</html>
