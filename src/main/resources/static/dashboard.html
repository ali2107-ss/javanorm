<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Дашборд</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <script src="app.js"></script>
  <script>renderSidebar();</script>
  
  <div class="layout">
    <div class="topbar">
      <div class="topbar-title">Дашборд</div>
      <div class="topbar-time" id="currentTime"></div>
    </div>
    
    <div class="content">
      <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 24px;" id="statsGrid">
        <!-- Rendered via JS -->
      </div>
      
      <div style="display: grid; grid-template-columns: 2fr 1fr; gap: 24px;">
        <div class="card" style="animation: slideIn 0.5s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Динамика баллов</h3>
          <canvas id="scoreChart" style="width: 100%; height: 250px;"></canvas>
        </div>
        
        <div class="card" style="animation: slideIn 0.6s ease;">
          <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); padding-bottom: 12px; margin-bottom: 12px;">
            <h3 style="font-size: 16px;">Последние документы</h3>
          </div>
          <div class="table-wrap">
            <table id="docsTable">
              <thead>
                <tr>
                  <th>Файл</th>
                  <th>Балл</th>
                  <th>Статус</th>
                </tr>
              </thead>
              <tbody>
                <!-- JS -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (checkAuth()) {
      initDashboard();
    }

    async function initDashboard() {
      // Load Stats
      let stats = await apiCall('/api/v1/admin/stats');
      if (!stats) stats = { totalDocuments: 5, passedDocuments: 3, failedDocuments: 2, averageScore: 76 };
      
      const total = stats.totalDocuments ?? 5;
      const passed = stats.passedDocuments ?? 3;
      const failed = stats.failedDocuments ?? 2;
      const avg = Math.round(stats.averageScore ?? 76);

      const items = [
        { label: 'Всего документов', value: total, icon: '<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline>' },
        { label: 'Успешно прошли', value: passed, icon: '<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline>' },
        { label: 'Требуют исправлений', value: failed, icon: '<circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line>' },
        { label: 'Средний балл', value: avg, icon: '<polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>' }
      ];

      const grid = document.getElementById('statsGrid');
      items.forEach((item, i) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.style.animation = `fadeIn 0.5s ease ${i * 0.1}s forwards`;
        div.style.opacity = '0';
        div.innerHTML = `
          <div style="display: flex; align-items: center; gap: 16px;">
            <div style="width: 40px; height: 40px; background: var(--accent-light); color: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center;">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">${item.icon}</svg>
            </div>
            <div>
              <div style="font-size: 36px; font-weight: 800; line-height: 1;" class="count-target">0</div>
              <div style="color: var(--text-gray); font-size: 14px; margin-top: 4px;">${item.label}</div>
            </div>
          </div>
        `;
        grid.appendChild(div);
        setTimeout(() => {
          animateCount(div.querySelector('.count-target'), item.value);
        }, 100 + i * 100);
      });

      // Chart
      const ctx = document.getElementById('scoreChart').getContext('2d');
      new Chart(ctx, {
        type: 'line',
        data: {
          labels: ['Пн', 'Вт', 'Ср', 'Чт', 'Пт', 'Сб', 'Вс'],
          datasets: [{
            label: 'Баллы проверок',
            data: [65, 78, 82, 71, 90, 87, 94],
            borderColor: '#FF6B00',
            backgroundColor: 'rgba(255,107,0,0.05)',
            borderWidth: 2,
            fill: true,
            tension: 0.4,
            pointBackgroundColor: '#FFFFFF',
            pointBorderColor: '#FF6B00',
            pointRadius: 4
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { legend: { display: false } },
          scales: {
            y: {
              beginAtZero: true, max: 100,
              grid: { color: 'rgba(0,0,0,0.05)' }
            },
            x: { grid: { display: false } }
          }
        }
      });

      // Table
      const demoDocs = [
        { name: 'ТЗ_Система.docx', score: 85, passed: true },
        { name: 'Пояснительная.docx', score: 62, passed: false },
        { name: 'Руководство.pdf', score: 92, passed: true },
        { name: 'Архитектура.docx', score: null, passed: null }
      ];
      let docsData = await apiCall('/api/v1/documents?size=5');
      let docs = Array.isArray(docsData) ? docsData : (docsData?.content || demoDocs);
      if (docs.length === 0) docs = demoDocs;

      const tbody = document.querySelector('#docsTable tbody');
      tbody.innerHTML = docs.slice(0, 5).map(doc => {
        const score = doc.score || doc.complianceScore;
        const name = doc.originalFilename || doc.fileName || doc.name || 'Документ';
        let badge = '<span class="badge" style="background:#FFF7ED;color:#EA580C">CHECKING</span>';
        let bVal = '-';
        if (score !== undefined && score !== null) {
          bVal = score;
          const ok = doc.passed ?? (score >= 80);
          badge = ok 
            ? '<span class="badge success">ПРОШЁЛ</span>'
            : '<span class="badge danger">НЕ ПРОШЁЛ</span>';
        } else if (doc.passed !== undefined && doc.passed !== null) {
          badge = doc.passed 
            ? '<span class="badge success">ПРОШЁЛ</span>'
            : '<span class="badge danger">НЕ ПРОШЁЛ</span>';
        }
        return `
          <tr>
            <td style="font-weight:500;">${name}</td>
            <td style="font-weight:600;">${bVal}</td>
            <td>${badge}</td>
          </tr>
        `;
      }).join('');
    }
  </script>
</body>
</html>
