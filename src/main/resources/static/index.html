<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>НормаКонтроль - Вход</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* Specific styles for auth toggle */
    .auth-tabs { display: flex; border-bottom: 2px solid var(--line); margin-bottom: 24px; }
    .auth-tab { flex: 1; text-align: center; padding: 12px; font-weight: 700; cursor: pointer; color: var(--muted); transition: var(--transition); border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .auth-tab.active { color: var(--primary); border-bottom-color: var(--primary); }
    .auth-tab:hover:not(.active) { color: var(--text); }
  </style>
</head>
<body class="login-page">
  <main class="login-card">
    <div class="login-logo">
      <span class="icon">📄</span>
      <h1>НормаКонтроль</h1>
      <p>Автоматизированная проверка ГОСТ</p>
    </div>

    <div class="auth-tabs">
      <div class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Вход</div>
      <div class="auth-tab" id="tabRegister" onclick="switchTab('register')">Регистрация</div>
    </div>

    <!-- Login Form -->
    <div id="formLogin">
      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap"><span>✉️</span><input id="email" type="email" value="admin@demo.ru" autocomplete="username"></div>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <div class="input-wrap"><span>🔒</span><input id="password" type="password" value="Admin1234!" autocomplete="current-password"></div>
      </div>

      <div class="error-box" id="errorBoxLogin"></div>
      <button class="btn btn-primary btn-full" onclick="login()">Войти в систему</button>

      <div style="text-align:center;color:var(--muted);margin-top:28px;font-weight:700;font-size:13px;text-transform:uppercase;letter-spacing:1px;">Демо-доступ</div>
      <div class="quick-login">
        <button class="btn btn-soft" onclick="quickLogin('admin@demo.ru','Admin1234!')">👑 Админ</button>
        <button class="btn btn-soft" onclick="quickLogin('user@demo.ru','User1234!')">👤 Студент</button>
      </div>
    </div>

    <!-- Register Form -->
    <div id="formRegister" style="display:none">
      <div class="field">
        <label for="regName">ФИО</label>
        <div class="input-wrap"><span>👤</span><input id="regName" type="text" placeholder="Иванов Иван"></div>
      </div>
      <div class="field">
        <label for="regEmail">Email</label>
        <div class="input-wrap"><span>✉️</span><input id="regEmail" type="email" placeholder="student@university.ru"></div>
      </div>
      <div class="field">
        <label for="regPassword">Пароль</label>
        <div class="input-wrap"><span>🔒</span><input id="regPassword" type="password" placeholder="Минимум 8 символов"></div>
      </div>

      <div class="error-box" id="errorBoxRegister"></div>
      <button class="btn btn-primary btn-full" onclick="register()">Зарегистрироваться</button>
    </div>

  </main>

  <script src="app.js"></script>
  <script>
    function switchTab(tab) {
      document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
      document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
      document.getElementById('formLogin').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('formRegister').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('errorBoxLogin').style.display = 'none';
      document.getElementById('errorBoxRegister').style.display = 'none';
    }

    function showError(form, text) {
      const box = document.getElementById(form === 'login' ? 'errorBoxLogin' : 'errorBoxRegister');
      box.textContent = text;
      box.style.display = 'block';
    }

    function quickLogin(email, password) {
      document.getElementById('email').value = email;
      document.getElementById('password').value = password;
      login();
    }

    function createDemoToken(email) {
      const role = email === 'admin@demo.ru' ? 'ROLE_ADMIN' : 'ROLE_USER';
      const name = email === 'admin@demo.ru' ? 'Администратор' : 'Студент';
      const payload = {
        sub: email,
        email: email,
        name: name,
        roles: role,
        exp: Math.floor(Date.now() / 1000) + 3600
      };
      const encode = obj => btoa(unescape(encodeURIComponent(JSON.stringify(obj))))
        .replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
      return encode({ alg: 'HS256', typ: 'JWT' }) + '.' + encode(payload) + '.demo';
    }

    function tryDemoLogin(email, password) {
      const demoUsers = {
        'admin@demo.ru': 'Admin1234!',
        'user@demo.ru': 'User1234!'
      };
      if (demoUsers[email] !== password) return false;
      localStorage.setItem('jwt_token', createDemoToken(email));
      window.location.href = '/dashboard.html';
      return true;
    }

    async function login() {
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      document.getElementById('errorBoxLogin').style.display = 'none';

      if (!email || !password) {
        showError('login', 'Введите email и пароль');
        return;
      }

      try {
        const response = await fetch('/api/v1/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ login: email, password: password })
        });
        if (!response.ok) throw new Error('Неверный email или пароль');
        const data = await response.json();
        const token = data.access_token || data.accessToken || data.token;
        if (!token) throw new Error('Сервер не вернул JWT токен');
        localStorage.setItem('jwt_token', token);
        window.location.href = '/dashboard.html';
      } catch (e) {
        if (tryDemoLogin(email, password)) return;
        showError('login', e.message || 'Ошибка входа');
      }
    }

    async function register() {
      const name = document.getElementById('regName').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value.trim();
      document.getElementById('errorBoxRegister').style.display = 'none';

      if (!name || !email || !password) {
        showError('register', 'Заполните все поля');
        return;
      }
      if (password.length < 6) {
        showError('register', 'Пароль должен быть минимум 6 символов');
        return;
      }

      // Generate username from email (part before @)
      const username = email.split('@')[0] || name.replace(/\s+/g, '_').toLowerCase();

      try {
        const response = await fetch('/api/v1/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            email: email,
            username: username,
            password: password,
            fullName: name
          })
        });
        if (!response.ok) {
          const errData = await response.json().catch(() => ({}));
          throw new Error(errData.message || errData.error || 'Ошибка при регистрации');
        }
        const data = await response.json();
        const token = data.access_token || data.accessToken || data.token;
        if (token) {
          // Registration returns tokens directly — use them
          localStorage.setItem('jwt_token', token);
          window.location.href = '/dashboard.html';
        } else {
          // Fallback: auto-login
          document.getElementById('email').value = email;
          document.getElementById('password').value = password;
          switchTab('login');
          login();
        }
      } catch (e) {
        showError('register', e.message || 'Сбой регистрации');
      }
    }
  </script>
</body>
</html>
