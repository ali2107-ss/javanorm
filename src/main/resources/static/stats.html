<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>НормаКонтроль - Статистика</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <script src="app.js"></script>
  <script>renderSidebar();</script>
  
  <div class="layout">
    <div class="topbar">
      <div class="topbar-title">Глобальная статистика</div>
    </div>
    
    <div class="content">
      <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 24px; margin-bottom: 24px;">
        <div class="card" style="animation: fadeIn 0.4s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Распределение баллов</h3>
          <canvas id="distChart" style="width: 100%; height: 300px;"></canvas>
        </div>
        
        <div class="card" style="animation: fadeIn 0.6s ease;">
          <h3 style="margin-bottom: 16px; font-size: 16px;">Топ нарушений по ГОСТ</h3>
          <canvas id="violChart" style="width: 100%; height: 300px;"></canvas>
        </div>
      </div>
      
      <div class="card" style="animation: fadeIn 0.8s ease;">
        <h3 style="margin-bottom: 16px; font-size: 16px;">Сводка по отделам/кафедрам</h3>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Подразделение</th><th>Проверено</th><th>Ср. балл</th><th>Успешно</th></tr>
            </thead>
            <tbody>
              <tr><td>ИУ6 - Компьютерные системы</td><td>142</td><td>82</td><td><span class="badge success">88%</span></td></tr>
              <tr><td>ИУ5 - Обработка информации</td><td>98</td><td>76</td><td><span class="badge warning">65%</span></td></tr>
              <tr><td>ИУ7 - Программное обеспечение</td><td>215</td><td>85</td><td><span class="badge success">92%</span></td></tr>
              <tr><td>РК6 - САПР</td><td>45</td><td>58</td><td><span class="badge danger">35%</span></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (checkAuth()) {
      initCharts();
    }

    function initCharts() {
      const c1 = document.getElementById('distChart').getContext('2d');
      new Chart(c1, {
        type: 'bar',
        data: {
          labels: ['0-20', '21-40', '41-60', '61-80', '81-100'],
          datasets: [{
            label: 'Документов',
            data: [5, 12, 34, 86, 142],
            backgroundColor: [
              '#FF3B30', '#FF9500', '#FFCC00', '#34C759', '#007AFF'
            ],
            borderRadius: 6
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { legend: { display: false } }
        }
      });

      const c2 = document.getElementById('violChart').getContext('2d');
      new Chart(c2, {
        type: 'doughnut',
        data: {
          labels: ['Поля', 'Шрифт', 'Нумерация', 'Оглавление', 'Интервалы'],
          datasets: [{
            data: [45, 25, 20, 15, 10],
            backgroundColor: [
              '#FF6B00', '#FF9500', '#FFCC00', '#34C759', '#007AFF'
            ],
            borderWidth: 0
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          cutout: '70%',
          plugins: {
            legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8 } }
          }
        }
      });
    }
  </script>
</body>
</html>
