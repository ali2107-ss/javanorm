databaseChangeLog:
  - changeSet:
      id: 003-create-documents
      author: normacontrol
      changes:
        - createTable:
            tableName: documents
            columns:
              - column:
                  name: id
                  type: UUID
                  defaultValueComputed: gen_random_uuid()
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: original_filename
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: storage_key
                  type: VARCHAR(500)
                  constraints:
                    nullable: false
              - column:
                  name: content_type
                  type: VARCHAR(100)
              - column:
                  name: file_size
                  type: BIGINT
              - column:
                  name: status
                  type: VARCHAR(50)
                  defaultValue: UPLOADED
                  constraints:
                    nullable: false
              - column:
                  name: owner_id
                  type: UUID
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  defaultValueComputed: NOW()
        - addForeignKeyConstraint:
            baseTableName: documents
            baseColumnNames: owner_id
            referencedTableName: users
            referencedColumnNames: id
            constraintName: fk_documents_owner
        - createIndex:
            indexName: idx_documents_owner
            tableName: documents
            columns:
              - column:
                  name: owner_id
        - createIndex:
            indexName: idx_documents_status
            tableName: documents
            columns:
              - column:
                  name: status
